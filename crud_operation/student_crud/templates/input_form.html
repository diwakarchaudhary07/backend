
<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .container {
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Form</h2>

    <form>
        <!-- Name -->
        <label>Name:</label>
        <input type="text" name="name" placeholder="Enter your name" required>

        <!-- Roll Number -->
        <label>Roll No:</label>
        <input type="number" name="roll" placeholder="Enter roll number" required>

        <!-- Image Upload -->
        <label>Upload Image:</label>
        <input type="file" name="image" accept="image/*">

        <!-- Email -->
        <label>Email:</label>
        <input type="email" name="email" placeholder="Enter your email" required>

        <!-- City -->
        <label>City:</label>
        <select name="city">
            <option value="">Select City</option>
            <option>Meerut</option>
            <option>Delhi</option>
            <option>Noida</option>
            <option>Ghaziabad</option>
        </select>

        <!-- Submit -->
        <button type="submit">Submit</button>
    </form>
</div>

</body>
</html>

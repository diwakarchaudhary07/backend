{% extends 'main.html' %}

{% block content %}

<a href="{% url 'student_create' %}">Add Student</a>

<table border="1" cellpadding="10">
<tr>
    <th>Name</th>
    <th>Roll</th>
    <th>Image</th>
    <th>Email</th>
    <th>City</th>
    <th>Actions</th>
</tr>

{% for student in students %}
<tr>
    <td>{{ student.std_name }}</td>
    <td>{{ student.std_roll }}</td>
    <td><img src="{{ student.std_image.url }}" width="100"></td>
    <td>{{ student.std_email }}</td>
    <td>{{ student.std_city }}</td>
    <td>
        <a href="{% url 'student_update' student.id %}">Edit</a>
        <a href="{% url 'student_delete' student.id %}">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}

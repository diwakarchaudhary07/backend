<!DOCTYPE html>
<html>
<body>

<h2>Product List</h2>

{% for product in products %}
    <div>
        <img src="{{ product.product_image.url }}" width="200">
        <h3>{{ product.product_name }}</h3>
        <p>₹{{ product.product_price }}</p>
        <p>{{ product.product_description }}</p>
    </div>
{% endfor %}

</body>
</html>
